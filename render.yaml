services:
  - type: static_site
    name: addugenete-shop
    env: static
    rootDir: .
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.13.1
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
